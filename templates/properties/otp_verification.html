{% extends 'properties/base.html' %}

{% block title %}التحقق برقم الهاتف - دلال{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">📱</div>
      <h1>التحقق برقم الهاتف</h1>
      <p>{{ purpose_display }}</p>
    </div>
    
    <div class="otp-info">
      <p>تم إرسال رمز التحقق إلى رقم: <strong>{{ phone }}</strong></p>
    </div>
    
    <form method="post" action="{% url 'verify_otp' %}" class="auth-form" id="otp-form">
      {% csrf_token %}
      <input type="hidden" name="phone" value="{{ phone }}">
      <input type="hidden" name="purpose" value="{{ purpose }}">
      
      <div class="form-group">
        <label for="otp-code">
          <span class="label-icon">🔢</span>
          رمز التحقق
        </label>
        <input 
          type="text" 
          name="code" 
          id="otp-code" 
          class="form-control" 
          required 
          maxlength="6" 
          pattern="[0-9]{6}"
          placeholder="أدخل الرمز المكون من 6 أرقام"
          autocomplete="one-time-code"
        >
        <small class="form-text">الرمز صالح لمدة 10 دقائق</small>
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg auth-submit">
        <span class="btn-icon">✓</span>
        تحقق
      </button>
    </form>
    
    <div class="auth-footer">
      <button type="button" class="btn-link" id="resend-otp">
        إعادة إرسال الرمز
      </button>
      <span id="resend-timer"></span>
    </div>
    
    <div class="auth-footer">
      <a href="{% if purpose == 'registration' %}{% url 'register' %}{% elif purpose == 'password_reset' %}{% url 'password_reset' %}{% else %}{% url 'login' %}{% endif %}" class="back-link">
        <span class="back-icon">←</span>
        العودة
      </a>
    </div>
  </div>
</div>

<style>
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--bg);
}

.auth-card {
  background: var(--card-bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}

.auth-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--gradient-primary);
}

.auth-header {
  text-align: center;
  margin-bottom: 24px;
}

.auth-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.auth-header h1 {
  font-size: 2rem;
  font-weight: 900;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.auth-header p {
  color: var(--text-light);
  font-size: 0.95rem;
}

.otp-info {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 24px;
  text-align: center;
}

.otp-info p {
  color: var(--text);
  font-size: 0.9rem;
  margin: 0;
}

.otp-info strong {
  color: var(--primary);
  font-size: 1.1rem;
}

.auth-form {
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: var(--text-light);
  font-weight: 600;
  font-size: 0.9rem;
}

.label-icon {
  margin-left: 8px;
}

.form-control {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 1rem;
  transition: all var(--transition);
}

.form-control:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.1);
}

.form-control::placeholder {
  color: var(--text-muted);
}

.form-text {
  display: block;
  margin-top: 6px;
  color: var(--text-muted);
  font-size: 0.8rem;
}

.auth-submit {
  width: 100%;
  padding: 14px;
  font-size: 1.1rem;
  font-weight: 700;
  border-radius: var(--radius);
  margin-top: 10px;
}

.btn-icon {
  margin-left: 8px;
}

.auth-footer {
  text-align: center;
  margin-top: 16px;
}

.btn-link {
  background: none;
  border: none;
  color: var(--primary);
  font-size: 0.9rem;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: var(--radius);
  transition: all var(--transition);
}

.btn-link:hover:not(:disabled) {
  background: var(--bg-elevated);
  color: var(--primary-light);
}

.btn-link:disabled {
  color: var(--text-muted);
  cursor: not-allowed;
}

#resend-timer {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-right: 8px;
}

.back-link {
  display: inline-flex;
  align-items: center;
  color: var(--text-light);
  text-decoration: none;
  font-size: 0.9rem;
  transition: color var(--transition);
}

.back-link:hover {
  color: var(--primary);
}

.back-icon {
  margin-left: 4px;
}

/* Responsive */
@media (max-width: 480px) {
  .auth-card {
    padding: 30px 20px;
  }
  
  .auth-header h1 {
    font-size: 1.5rem;
  }
  
  .auth-icon {
    font-size: 2.5rem;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const resendBtn = document.getElementById('resend-otp');
  const resendTimer = document.getElementById('resend-timer');
  const phone = document.querySelector('input[name="phone"]').value;
  const purpose = document.querySelector('input[name="purpose"]').value;
  
  let countdown = 60;
  let canResend = false;
  
  // بدء العد التنازلي
  function startCountdown() {
    canResend = false;
    resendBtn.disabled = true;
    
    const interval = setInterval(() => {
      countdown--;
      resendTimer.textContent = `(${countdown} ثانية)`;
      
      if (countdown <= 0) {
        clearInterval(interval);
        canResend = true;
        resendBtn.disabled = false;
        resendTimer.textContent = '';
      }
    }, 1000);
  }
  
  // بدء العد التنازلي عند التحميل
  startCountdown();
  
  // إعادة إرسال OTP
  resendBtn.addEventListener('click', function() {
    if (!canResend) return;
    
    const formData = new FormData();
    formData.append('phone', phone);
    formData.append('purpose', purpose);
    
    fetch('{% url "resend_otp" %}', {
      method: 'POST',
      body: formData,
      headers: {
        'X-CSRFToken': document.querySelector('[name="csrfmiddlewaretoken"]').value
      }
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        alert('تم إرسال رمز التحقق الجديد بنجاح');
        countdown = 60;
        startCountdown();
      } else {
        alert(data.error || 'حدث خطأ أثناء إعادة الإرسال');
      }
    })
    .catch(error => {
      console.error('Error:', error);
      alert('حدث خطأ أثناء إعادة الإرسال');
    });
  });
  
  // تنسيق إدخال OTP
  const otpInput = document.getElementById('otp-code');
  otpInput.addEventListener('input', function(e) {
    // السماح فقط بالأرقام
    this.value = this.value.replace(/[^0-9]/g, '');
  });
});
</script>
{% endblock %}
