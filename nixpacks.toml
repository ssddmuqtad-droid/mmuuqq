[phases.setup]
nixPkgs = ["python312", "gcc", "pkg-config", "postgresql"]

[phases.build]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt",
    "echo '=== Checking and copying static files to Railway public folder ==='",
    "echo 'Checking if static directory exists:'",
    "ls -la static/ || echo 'static directory not found'",
    "echo 'Creating public directory for Railway static serving:'",
    "mkdir -p public",
    "echo 'Copying static files to public directory:'",
    "cp -r static/* public/ || echo 'static copy failed'",
    "echo '=== Checking public directory ==='",
    "ls -la public/",
    "echo '=== Checking files before build ==='",
    "echo 'Checking if dalal_project directory exists:'",
    "ls -la dalal_project/",
    "echo 'Checking if settings.py exists:'",
    "ls -la dalal_project/settings.py",
    "echo 'Checking if properties directory exists:'",
    "ls -la properties/",
    "echo '=== Running Django commands ==='",
    "python manage.py makemigrations --noinput",
    "python manage.py migrate --noinput",
    "python manage.py collectstatic --noinput --clear"
]

[phases.start]
cmd = "python run_server.py"

[variables]
DEBUG = "False"
PORT = "8080"
PYTHONUNBUFFERED = "1"
PYTHONPATH = "/app"
DJANGO_SETTINGS_MODULE = "dalal_project.settings"
ALLOW_SQLITE_FALLBACK = "False"
GUNICORN_WORKERS = "2"
GUNICORN_TIMEOUT = "120"
GUNICORN_LOG_LEVEL = "debug"
