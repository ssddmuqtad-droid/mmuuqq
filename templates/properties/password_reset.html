{% extends 'properties/base.html' %}

{% block title %}إعادة تعيين كلمة المرور{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔑</div>
      <h1>إعادة تعيين كلمة المرور</h1>
      <p>أدخل بريدك الإلكتروني لإعادة تعيين كلمة المرور</p>
    </div>

    <form method="post" action="{% url 'password_reset' %}" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="email">
          <span class="label-icon">📧</span>
          البريد الإلكتروني
        </label>
        <input type="email" name="email" id="email" class="form-control" required autocomplete="email" placeholder="أدخل بريدك الإلكتروني">
      </div>
      
      <div class="form-group">
        <label for="phone">
          <span class="label-icon">📱</span>
          رقم الهاتف
        </label>
        <div class="phone-input-group">
          <input type="tel" name="phone" id="phone" class="form-control" required autocomplete="tel" placeholder="07XXXXXXXXX">
          <button type="button" class="btn btn-outline" id="send-otp-btn">
            <span class="btn-icon">📲</span>
            إرسال رمز
          </button>
        </div>
        <small class="form-text" id="otp-status"></small>
      </div>
      
      <div class="form-group" id="otp-group" style="display: none;">
        <label for="otp-code">
          <span class="label-icon">🔢</span>
          رمز التحقق
        </label>
        <input type="text" name="otp_code" id="otp-code" class="form-control" maxlength="6" pattern="[0-9]{6}" placeholder="أدخل الرمز المكون من 6 أرقام">
        <small class="form-text">الرمز صالح لمدة 10 دقائق</small>
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg auth-submit">
        <span class="btn-icon">📤</span>
        إرسال رابط إعادة التعيين
      </button>
    </form>

    <div class="auth-footer">
      <a href="{% url 'login' %}" class="back-link">
        <span class="back-icon">←</span>
        العودة لتسجيل الدخول
      </a>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const sendOtpBtn = document.getElementById('send-otp-btn');
  const phoneInput = document.getElementById('phone');
  const otpGroup = document.getElementById('otp-group');
  const otpCode = document.getElementById('otp-code');
  const otpStatus = document.getElementById('otp-status');
  const resetForm = document.querySelector('.auth-form');
  
  let isOtpVerified = false;
  
  // إرسال OTP
  sendOtpBtn.addEventListener('click', function() {
    const phone = phoneInput.value.trim();
    
    if (!phone) {
      otpStatus.textContent = 'يرجى إدخال رقم الهاتف';
      otpStatus.className = 'form-text error';
      return;
    }
    
    if (!phone.startsWith('07') || phone.length !== 11) {
      otpStatus.textContent = 'رقم الهاتف يجب أن يبدأ بـ 07 ويكون 11 رقم';
      otpStatus.className = 'form-text error';
      return;
    }
    
    const formData = new FormData();
    formData.append('phone', phone);
    formData.append('purpose', 'password_reset');
    
    sendOtpBtn.disabled = true;
    sendOtpBtn.innerHTML = '<span class="btn-icon">⏳</span> جاري الإرسال...';
    
    fetch('{% url "send_otp" %}', {
      method: 'POST',
      body: formData,
      headers: {
        'X-CSRFToken': document.querySelector('[name="csrfmiddlewaretoken"]').value
      }
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        otpStatus.textContent = 'تم إرسال رمز التحقق بنجاح. الرمز صالح لمدة 10 دقائق';
        otpStatus.className = 'form-text success';
        otpGroup.style.display = 'block';
        otpCode.focus();
        sendOtpBtn.innerHTML = '<span class="btn-icon">📲</span> إعادة الإرسال';
      } else {
        otpStatus.textContent = data.error || 'حدث خطأ أثناء إرسال رمز التحقق';
        otpStatus.className = 'form-text error';
      }
    })
    .catch(error => {
      console.error('Error:', error);
      otpStatus.textContent = 'حدث خطأ أثناء إرسال رمز التحقق';
      otpStatus.className = 'form-text error';
    })
    .finally(() => {
      sendOtpBtn.disabled = false;
    });
  });
  
  // التحقق من OTP عند الإدخال
  otpCode.addEventListener('blur', function() {
    const code = this.value.trim();
    const phone = phoneInput.value.trim();
    
    if (code.length === 6 && phone) {
      const formData = new FormData();
      formData.append('phone', phone);
      formData.append('code', code);
      formData.append('purpose', 'password_reset');
      
      fetch('{% url "verify_otp" %}', {
        method: 'POST',
        body: formData,
        headers: {
          'X-CSRFToken': document.querySelector('[name="csrfmiddlewaretoken"]').value
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          otpStatus.textContent = 'تم التحقق من الرمز بنجاح';
          otpStatus.className = 'form-text success';
          isOtpVerified = true;
          otpCode.style.borderColor = 'var(--success)';
        } else {
          otpStatus.textContent = data.error || 'رمز التحقق غير صحيح';
          otpStatus.className = 'form-text error';
          isOtpVerified = false;
          otpCode.style.borderColor = 'var(--danger)';
        }
      })
      .catch(error => {
        console.error('Error:', error);
        otpStatus.textContent = 'حدث خطأ أثناء التحقق';
        otpStatus.className = 'form-text error';
      });
    }
  });
  
  // السماح فقط بالأرقام في حقل OTP
  otpCode.addEventListener('input', function(e) {
    this.value = this.value.replace(/[^0-9]/g, '');
  });
  
  // التحقق من OTP قبل إرسال النموذج
  resetForm.addEventListener('submit', function(e) {
    const phone = phoneInput.value.trim();
    const code = otpCode.value.trim();
    
    if (phone && !isOtpVerified) {
      e.preventDefault();
      otpStatus.textContent = 'يرجى التحقق من رقم الهاتف أولاً';
      otpStatus.className = 'form-text error';
      otpCode.focus();
      return false;
    }
  });
});
</script>

<style>
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--bg);
}

.auth-card {
  background: var(--card-bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}

.auth-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--gradient-primary);
}

.auth-header {
  text-align: center;
  margin-bottom: 24px;
}

.auth-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.auth-header h1 {
  font-size: 2rem;
  font-weight: 900;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.auth-header p {
  color: var(--text-light);
  font-size: 0.95rem;
}

.phone-input-group {
  display: flex;
  gap: 8px;
}

.phone-input-group .form-control {
  flex: 1;
}

.phone-input-group .btn {
  white-space: nowrap;
  padding: 12px 16px;
  font-size: 0.9rem;
}

#otp-status {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-top: 6px;
}

#otp-status.success {
  color: var(--success);
}

#otp-status.error {
  color: var(--danger);
}

.auth-form {
  margin-bottom: 24px;
}

.auth-form .form-group {
  margin-bottom: 20px;
}

.auth-form label {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 0.95rem;
}

.label-icon {
  font-size: 1.1rem;
}

.auth-form .form-control {
  background: var(--bg-alt);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  color: var(--text);
  font-size: 1rem;
  transition: all 0.3s ease;
  width: 100%;
}

.auth-form .form-control:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
}

.auth-form .form-control::placeholder {
  color: var(--text-light);
}

.auth-submit {
  width: 100%;
  padding: 16px;
  font-size: 1.1rem;
  font-weight: 700;
  background: var(--gradient-primary);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
}

.auth-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
}

.auth-submit:active {
  transform: translateY(0);
}

.btn-icon {
  font-size: 1.2rem;
}

.auth-footer {
  text-align: center;
  margin-top: 24px;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-light);
  text-decoration: none;
  font-size: 0.9rem;
  transition: all 0.3s ease;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
}

.back-link:hover {
  color: var(--primary);
  background: rgba(255, 107, 53, 0.1);
}

.back-icon {
  transition: transform 0.3s ease;
}

.back-link:hover .back-icon {
  transform: translateX(-4px);
}

@media (max-width: 480px) {
  .auth-card {
    padding: 28px;
  }
  
  .auth-header h1 {
    font-size: 1.6rem;
  }
  
  .auth-icon {
    font-size: 2.5rem;
  }
}
</style>
{% endblock %}
