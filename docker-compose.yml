version: '3.8'

services:
  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key-change-in-production
      - DATABASE_URL=
      - ALLOWED_HOSTS=localhost,127.0.0.1
    volumes:
      - .:/app
      - ./logs:/app/logs
    command: python manage.py runserver 0.0.0.0:8080
    networks:
      - dalal-network

networks:
  dalal-network:
    driver: bridge