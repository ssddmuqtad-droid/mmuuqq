{% extends 'properties/dashboard_base.html' %}
{% load static %}

{% block title %}الرسائل{% endblock %}

{% block extra_css %}
<style>
  .messaging-dashboard {
    background: #0B0B0B;
    min-height: calc(100vh - 60px);
    display: flex;
    gap: 0;
  }

  .conversations-sidebar {
    width: 380px;
    background: #1a1a1a;
    border-left: 1px solid #333;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 1.5rem;
    border-bottom: 1px solid #333;
  }

  .sidebar-title {
    color: #fff;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 1rem;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: #2d2d2d;
    border: 1px solid #444;
    color: #fff;
    padding: 0.75rem 1rem 0.75rem 2.5rem;
    border-radius: 8px;
    font-size: 0.95rem;
  }

  .search-box input:focus {
    outline: none;
    border-color: #FF6B35;
  }

  .search-box svg {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    fill: #888;
  }

  .folder-tabs {
    display: flex;
    padding: 0.5rem 1rem;
    gap: 0.5rem;
    border-bottom: 1px solid #333;
    overflow-x: auto;
  }

  .folder-tab {
    padding: 0.5rem 1rem;
    background: transparent;
    border: none;
    color: #888;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s ease;
    font-size: 0.9rem;
  }

  .folder-tab:hover {
    background: #2d2d2d;
    color: #fff;
  }

  .folder-tab.active {
    background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
    color: #fff;
  }

  .folder-tab .badge {
    background: #FF6B35;
    color: #fff;
    padding: 0.1rem 0.5rem;
    border-radius: 10px;
    font-size: 0.75rem;
    margin-right: 0.25rem;
  }

  .conversations-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
  }

  .conversation-item {
    background: #2d2d2d;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid transparent;
  }

  .conversation-item:hover {
    background: #3d3d3d;
    transform: translateX(-4px);
  }

  .conversation-item.active {
    background: linear-gradient(135deg, rgba(255, 107, 53, 0.1) 0%, rgba(255, 140, 66, 0.1) 100%);
    border-color: #FF6B35;
  }

  .conversation-item.unread {
    border-right: 3px solid #FF6B35;
  }

  .conversation-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
  }

  .conversation-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 600;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .conversation-info {
    flex: 1;
    min-width: 0;
  }

  .conversation-name {
    color: #fff;
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 0.25rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conversation-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
    color: #888;
  }

  .conversation-time {
    margin-right: auto;
  }

  .conversation-preview {
    color: #888;
    font-size: 0.85rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conversation-actions {
    display: flex;
    gap: 0.25rem;
  }

  .conversation-action-btn {
    background: transparent;
    border: none;
    color: #666;
    padding: 0.25rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
  }

  .conversation-action-btn:hover {
    color: #FF6B35;
    background: rgba(255, 107, 53, 0.1);
  }

  .conversation-action-btn.starred {
    color: #FF6B35;
  }

  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #0B0B0B;
  }

  .chat-header {
    background: #1a1a1a;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .chat-header-avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 600;
  }

  .chat-header-info {
    flex: 1;
  }

  .chat-header-name {
    color: #fff;
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 0.25rem;
  }

  .chat-header-status {
    color: #888;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
  }

  .status-dot.offline {
    background: #666;
  }

  .chat-header-actions {
    display: flex;
    gap: 0.5rem;
  }

  .chat-header-btn {
    background: #2d2d2d;
    border: 1px solid #444;
    color: #fff;
    padding: 0.5rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .chat-header-btn:hover {
    background: #3d3d3d;
    border-color: #FF6B35;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .message-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .message-group.sent {
    align-items: flex-end;
  }

  .message-group.received {
    align-items: flex-start;
  }

  .message-bubble {
    max-width: 70%;
    padding: 1rem;
    border-radius: 16px;
    position: relative;
  }

  .message-group.sent .message-bubble {
    background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .message-group.received .message-bubble {
    background: #2d2d2d;
    color: #fff;
    border-bottom-left-radius: 4px;
    border: 1px solid #333;
  }

  .message-sender {
    font-weight: 600;
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
    color: #FF6B35;
  }

  .message-content {
    line-height: 1.5;
    word-wrap: break-word;
  }

  .message-attachment {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    padding: 0.75rem;
    margin-top: 0.5rem;
  }

  .message-attachment img {
    max-width: 100%;
    border-radius: 8px;
  }

  .property-card {
    background: rgba(0, 0, 0, 0.3);
    border-radius: 8px;
    padding: 0.75rem;
    margin-top: 0.5rem;
    display: flex;
    gap: 0.75rem;
    text-decoration: none;
    color: #fff;
  }

  .property-card img {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    object-fit: cover;
  }

  .property-info h4 {
    font-size: 0.9rem;
    margin-bottom: 0.25rem;
  }

  .property-info p {
    color: #888;
    font-size: 0.8rem;
    margin: 0;
  }

  .message-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
    font-size: 0.75rem;
    opacity: 0.7;
  }

  .message-actions {
    display: flex;
    gap: 0.25rem;
    margin-right: auto;
  }

  .message-action-btn {
    background: transparent;
    border: none;
    color: inherit;
    padding: 0.25rem;
    cursor: pointer;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.3s ease;
  }

  .message-bubble:hover .message-action-btn {
    opacity: 1;
  }

  .message-action-btn:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .chat-input-area {
    background: #1a1a1a;
    padding: 1rem 1.5rem;
    border-top: 1px solid #333;
  }

  .input-wrapper {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
  }

  .input-actions {
    display: flex;
    gap: 0.5rem;
  }

  .input-action-btn {
    background: #2d2d2d;
    border: 1px solid #444;
    color: #fff;
    padding: 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .input-action-btn:hover {
    background: #3d3d3d;
    border-color: #FF6B35;
  }

  .message-input {
    flex: 1;
    background: #2d2d2d;
    border: 1px solid #444;
    color: #fff;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    font-family: inherit;
  }

  .message-input:focus {
    outline: none;
    border-color: #FF6B35;
  }

  .send-btn {
    background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
    color: #fff;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
  }

  .send-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #888;
    text-align: center;
    padding: 2rem;
  }

  .empty-state svg {
    width: 80px;
    height: 80px;
    margin-bottom: 1rem;
    fill: #333;
  }

  .empty-state h3 {
    color: #fff;
    margin-bottom: 0.5rem;
  }

  .typing-indicator {
    display: flex;
    gap: 0.25rem;
    padding: 0.5rem;
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #888;
    animation: typing 1.4s infinite;
  }

  .typing-indicator span:nth-child(2) {
    animation-delay: 0.2s;
  }

  .typing-indicator span:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes typing {
    0%, 60%, 100% {
      transform: translateY(0);
    }
    30% {
      transform: translateY(-10px);
    }
  }

  @media (max-width: 1024px) {
    .conversations-sidebar {
      width: 300px;
    }
  }

  @media (max-width: 768px) {
    .messaging-dashboard {
      flex-direction: column;
    }

    .conversations-sidebar {
      width: 100%;
      height: 40vh;
    }

    .chat-area {
      height: 60vh;
    }

    .message-bubble {
      max-width: 85%;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="messaging-dashboard">
  <!-- Conversations Sidebar -->
  <div class="conversations-sidebar">
    <div class="sidebar-header">
      <h2 class="sidebar-title">الرسائل</h2>
      <div class="search-box">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="بحث في المحادثات..." id="searchConversations">
      </div>
    </div>

    <div class="folder-tabs">
      <button class="folder-tab active" data-folder="all">
        <span class="badge" id="allCount">0</span>
        الكل
      </button>
      <button class="folder-tab" data-folder="inbox">
        <span class="badge" id="inboxCount">0</span>
        <span>📥</span> الوارد
      </button>
      <button class="folder-tab" data-folder="sent">
        <span>📤</span> الصادر
      </button>
      <button class="folder-tab" data-folder="starred">
        <span>⭐</span> مميز
      </button>
      <button class="folder-tab" data-folder="archived">
        <span>📁</span> مؤرشف
      </button>
    </div>

    <div class="conversations-list" id="conversationsList">
      <!-- Conversations will be loaded here -->
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      <h3>اختر محادثة للبدء</h3>
      <p>أو ابدأ محادثة جديدة مع أحد المستخدمين</p>
    </div>
  </div>
</div>

<script>
// Messaging Dashboard JavaScript
document.addEventListener('DOMContentLoaded', function() {
  const conversationsList = document.getElementById('conversationsList');
  const chatArea = document.getElementById('chatArea');
  const searchInput = document.getElementById('searchConversations');
  const folderTabs = document.querySelectorAll('.folder-tab');
  
  let currentFolder = 'all';
  let currentConversation = null;

  // Load conversations
  async function loadConversations(folder = 'all', search = '') {
    try {
      const response = await fetch(`/api/conversations/?folder=${folder}&search=${search}`);
      const data = await response.json();
      
      renderConversations(data.conversations);
      updateCounts(data.counts);
    } catch (error) {
      console.error('Error loading conversations:', error);
    }
  }

  // Render conversations
  function renderConversations(conversations) {
    conversationsList.innerHTML = '';
    
    conversations.forEach(conv => {
      const item = document.createElement('div');
      item.className = `conversation-item ${conv.unread ? 'unread' : ''} ${conv.starred ? 'starred' : ''}`;
      item.dataset.conversationId = conv.id;
      
      item.innerHTML = `
        <div class="conversation-header">
          <div class="conversation-avatar">${conv.avatar}</div>
          <div class="conversation-info">
            <div class="conversation-name">${conv.name}</div>
            <div class="conversation-meta">
              <span class="conversation-time">${conv.time}</span>
              <span>${conv.type}</span>
            </div>
          </div>
          <div class="conversation-actions">
            <button class="conversation-action-btn ${conv.starred ? 'starred' : ''}" onclick="toggleStar(event, '${conv.id}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </button>
            <button class="conversation-action-btn" onclick="archiveConversation(event, '${conv.id}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM12 17.5L6.5 12H10v-2h4v2h3.5L12 17.5zM5.12 5l.81-1h12l.94 1H5.12z"/></svg>
            </button>
          </div>
        </div>
        <div class="conversation-preview">${conv.preview}</div>
      `;
      
      item.addEventListener('click', () => loadConversation(conv.id));
      conversationsList.appendChild(item);
    });
  }

  // Load conversation
  async function loadConversation(conversationId) {
    try {
      const response = await fetch(`/api/conversations/${conversationId}/`);
      const data = await response.json();
      
      renderChatArea(data);
      currentConversation = conversationId;
      
      // Update active state
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.conversationId === conversationId) {
          item.classList.add('active');
        }
      });
    } catch (error) {
      console.error('Error loading conversation:', error);
    }
  }

  // Render chat area
  function renderChatArea(data) {
    chatArea.innerHTML = `
      <div class="chat-header">
        <div class="chat-header-avatar">${data.avatar}</div>
        <div class="chat-header-info">
          <div class="chat-header-name">${data.name}</div>
          <div class="chat-header-status">
            <span class="status-dot ${data.online ? '' : 'offline'}"></span>
            ${data.online ? 'متصل' : 'غير متصل'}
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="chat-header-btn" onclick="toggleStarConversation()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          </button>
          <button class="chat-header-btn" onclick="archiveCurrentConversation()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM12 17.5L6.5 12H10v-2h4v2h3.5L12 17.5zM5.12 5l.81-1h12l.94 1H5.12z"/></svg>
          </button>
          <button class="chat-header-btn" onclick="searchInConversation()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </button>
        </div>
      </div>
      
      <div class="chat-messages" id="messagesContainer">
        ${data.messages.map(msg => renderMessage(msg)).join('')}
      </div>
      
      <div class="chat-input-area">
        <div class="input-wrapper">
          <div class="input-actions">
            <button class="input-action-btn" onclick="attachFile()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
            </button>
            <button class="input-action-btn" onclick="attachImage()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            </button>
            <button class="input-action-btn" onclick="attachProperty()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
          </div>
          <textarea class="message-input" id="messageInput" placeholder="اكتب رسالتك..." rows="1"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    `;
    
    // Scroll to bottom
    const messagesContainer = document.getElementById('messagesContainer');
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  // Render single message
  function renderMessage(msg) {
    const isSent = msg.sent_by_me;
    
    return `
      <div class="message-group ${isSent ? 'sent' : 'received'}">
        <div class="message-bubble">
          ${!isSent ? `<div class="message-sender">${msg.sender}</div>` : ''}
          <div class="message-content">${msg.content}</div>
          ${msg.attachment ? renderAttachment(msg.attachment) : ''}
          ${msg.property ? renderPropertyCard(msg.property) : ''}
          <div class="message-meta">
            <div class="message-actions">
              <button class="message-action-btn" onclick="replyToMessage('${msg.id}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
              </button>
              <button class="message-action-btn" onclick="forwardMessage('${msg.id}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8V4l8 8-8 8v-4H4V8z"/></svg>
              </button>
              ${isSent ? `<button class="message-action-btn" onclick="editMessage('${msg.id}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
              </button>` : ''}
              <button class="message-action-btn" onclick="deleteMessage('${msg.id}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
              </button>
            </div>
            <span>${msg.time}</span>
            ${isSent ? `<span>${msg.status}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  // Render attachment
  function renderAttachment(attachment) {
    if (attachment.type === 'image') {
      return `<div class="message-attachment"><img src="${attachment.url}" alt="صورة"></div>`;
    }
    return `<div class="message-attachment">📎 ${attachment.name}</div>`;
  }

  // Render property card
  function renderPropertyCard(property) {
    return `
      <a href="${property.url}" class="property-card">
        <img src="${property.image}" alt="${property.name}">
        <div class="property-info">
          <h4>${property.name}</h4>
          <p>${property.price} • ${property.location}</p>
        </div>
      </a>
    `;
  }

  // Update counts
  function updateCounts(counts) {
    document.getElementById('allCount').textContent = counts.all || 0;
    document.getElementById('inboxCount').textContent = counts.inbox || 0;
  }

  // Toggle star
  async function toggleStar(event, conversationId) {
    event.stopPropagation();
    try {
      await fetch(`/api/conversations/${conversationId}/star/`, { method: 'POST' });
      loadConversations(currentFolder, searchInput.value);
    } catch (error) {
      console.error('Error toggling star:', error);
    }
  }

  // Archive conversation
  async function archiveConversation(event, conversationId) {
    event.stopPropagation();
    try {
      await fetch(`/api/conversations/${conversationId}/archive/`, { method: 'POST' });
      loadConversations(currentFolder, searchInput.value);
    } catch (error) {
      console.error('Error archiving conversation:', error);
    }
  }

  // Send message
  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    
    if (!content || !currentConversation) return;
    
    try {
      const response = await fetch(`/api/conversations/${currentConversation}/messages/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      });
      
      if (response.ok) {
        input.value = '';
        loadConversation(currentConversation);
      }
    } catch (error) {
      console.error('Error sending message:', error);
    }
  }

  // Folder tab click
  folderTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      folderTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFolder = tab.dataset.folder;
      loadConversations(currentFolder, searchInput.value);
    });
  });

  // Search
  searchInput.addEventListener('input', (e) => {
    loadConversations(currentFolder, e.target.value);
  });

  // Initial load
  loadConversations();
});
</script>
{% endblock %}
