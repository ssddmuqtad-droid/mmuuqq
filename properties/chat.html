{% extends 'properties/base.html' %}
{% load static %}

{% block title %}المحادثات{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-sidebar">
        <div class="chat-header">
            <h2>💬 المحادثات</h2>
            <button class="btn-primary" onclick="createNewConversation()">
                <span>➕ محادثة جديدة</span>
            </button>
        </div>
        
        <div class="chat-search">
            <input type="text" id="searchConversations" placeholder="🔍 بحث عن محادثة..." onkeyup="searchConversations()">
        </div>
        
        <div class="conversations-list" id="conversationsList">
            <div class="loading">جاري التحميل...</div>
        </div>
    </div>
    
    <div class="chat-main" id="chatMain">
        <div class="chat-empty-state">
            <div class="empty-icon">💬</div>
            <h3>اختر محادثة للبدء</h3>
            <p>أو أنشئ محادثة جديدة للتواصل مع المستخدمين</p>
        </div>
    </div>
</div>

<!-- Create Conversation Modal -->
<div class="modal" id="createConversationModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>إنشاء محادثة جديدة</h3>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <form id="createConversationForm">
                <div class="form-group">
                    <label>نوع المحادثة</label>
                    <select name="conversation_type" id="conversationType" onchange="toggleGroupName()">
                        <option value="direct">محادثة مباشرة</option>
                        <option value="group">مجموعة</option>
                    </select>
                </div>
                
                <div class="form-group" id="groupNameGroup" style="display: none;">
                    <label>اسم المجموعة</label>
                    <input type="text" name="name" placeholder="اسم المجموعة">
                </div>
                
                <div class="form-group">
                    <label>المشاركون</label>
                    <select name="participant_ids" id="participantSelect" multiple>
                        <!-- Will be populated dynamically -->
                    </select>
                    <small>اضغط Ctrl لاختيار أكثر من مستخدم</small>
                </div>
                
                <button type="submit" class="btn-primary">إنشاء المحادثة</button>
            </form>
        </div>
    </div>
</div>

<style>
.chat-container {
    display: flex;
    height: calc(100vh - 60px);
    background: #f5f5f5;
    margin: -20px;
    margin-bottom: -40px;
}

.chat-sidebar {
    width: 350px;
    background: white;
    border-left: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
}

.chat-header {
    padding: 20px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-header h2 {
    margin: 0;
    font-size: 20px;
    color: #333;
}

.chat-search {
    padding: 15px;
    border-bottom: 1px solid #e0e0e0;
}

.chat-search input {
    width: 100%;
    padding: 10px 15px;
    border: 1px solid #ddd;
    border-radius: 25px;
    font-size: 14px;
}

.conversations-list {
    flex: 1;
    overflow-y: auto;
}

.conversation-item {
    padding: 15px 20px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
}

.conversation-item:hover {
    background: #f8f9fa;
}

.conversation-item.active {
    background: #e3f2fd;
    border-left: 3px solid #2196F3;
}

.conversation-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
}

.conversation-info {
    flex: 1;
    min-width: 0;
}

.conversation-name {
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.conversation-last-message {
    font-size: 13px;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.conversation-meta {
    text-align: left;
    font-size: 12px;
    color: #999;
}

.unread-badge {
    background: #f44336;
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
}

.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: white;
}

.chat-empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #999;
}

.empty-icon {
    font-size: 80px;
    margin-bottom: 20px;
}

.chat-header-bar {
    padding: 15px 20px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    gap: 15px;
    background: white;
}

.chat-header-info {
    flex: 1;
}

.chat-header-name {
    font-weight: 600;
    color: #333;
}

.chat-header-status {
    font-size: 13px;
    color: #666;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f5f5f5;
}

.message {
    margin-bottom: 15px;
    display: flex;
    gap: 10px;
}

.message.sent {
    flex-direction: row-reverse;
}

.message-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
}

.message-content {
    max-width: 70%;
}

.message-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    position: relative;
    word-wrap: break-word;
}

.message.received .message-bubble {
    background: white;
    border-bottom-left-radius: 4px;
}

.message.sent .message-bubble {
    background: #2196F3;
    color: white;
    border-bottom-right-radius: 4px;
}

.message-time {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
}

.message.sent .message-time {
    text-align: right;
}

.chat-input-area {
    padding: 15px 20px;
    border-top: 1px solid #e0e0e0;
    background: white;
    display: flex;
    gap: 10px;
    align-items: center;
}

.chat-input {
    flex: 1;
    padding: 12px 20px;
    border: 1px solid #ddd;
    border-radius: 25px;
    font-size: 14px;
    resize: none;
    max-height: 100px;
}

.chat-send-btn {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #2196F3;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}

.chat-send-btn:hover {
    background: #1976D2;
}

.typing-indicator {
    padding: 10px 20px;
    font-size: 13px;
    color: #666;
    font-style: italic;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

.modal.active {
    display: flex;
}

.modal-content {
    background: white;
    border-radius: 8px;
    width: 90%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
}

.modal-header {
    padding: 20px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.modal-header h3 {
    margin: 0;
}

.close-btn {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #666;
}

.modal-body {
    padding: 20px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
}

.form-group small {
    display: block;
    margin-top: 5px;
    color: #666;
    font-size: 12px;
}

.loading {
    padding: 20px;
    text-align: center;
    color: #666;
}

@media (max-width: 768px) {
    .chat-sidebar {
        width: 100%;
        position: absolute;
        z-index: 100;
        height: 100%;
        transform: translateX(-100%);
        transition: transform 0.3s;
    }
    
    .chat-sidebar.active {
        transform: translateX(0);
    }
    
    .chat-main {
        width: 100%;
    }
}
</style>

<script>
let currentConversation = null;
let websocket = null;
let conversations = [];

// Load conversations on page load
document.addEventListener('DOMContentLoaded', function() {
    loadConversations();
    loadUsers();
});

async function loadConversations() {
    try {
        const response = await fetch('/api/conversations/');
        const data = await response.json();
        conversations = data.results || data;
        renderConversations(conversations);
    } catch (error) {
        console.error('Error loading conversations:', error);
    }
}

function renderConversations(convs) {
    const list = document.getElementById('conversationsList');
    
    if (convs.length === 0) {
        list.innerHTML = '<div class="loading">لا توجد محادثات</div>';
        return;
    }
    
    list.innerHTML = convs.map(conv => `
        <div class="conversation-item ${currentConversation === conv.conversation_id ? 'active' : ''}" 
             onclick="openConversation('${conv.conversation_id}')">
            <div class="conversation-avatar">
                ${conv.conversation_type === 'group' ? '👥' : '👤'}
            </div>
            <div class="conversation-info">
                <div class="conversation-name">
                    ${conv.name || getConversationName(conv)}
                </div>
                <div class="conversation-last-message">
                    ${conv.last_message ? conv.last_message.content : 'لا توجد رسائل'}
                </div>
            </div>
            <div class="conversation-meta">
                <div>${formatTime(conv.last_message_at)}</div>
                ${conv.unread_count > 0 ? `<div class="unread-badge">${conv.unread_count}</div>` : ''}
            </div>
        </div>
    `).join('');
}

function getConversationName(conv) {
    if (conv.participants && conv.participants.length > 0) {
        const otherParticipants = conv.participants.filter(p => p.user.username !== '{{ request.user.username }}');
        if (otherParticipants.length > 0) {
            return otherParticipants.map(p => p.user.username).join(', ');
        }
    }
    return 'محادثة';
}

function formatTime(timestamp) {
    if (!timestamp) return '';
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return 'الآن';
    if (diff < 3600000) return Math.floor(diff / 60000) + ' د';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' س';
    return date.toLocaleDateString('ar-EG');
}

async function openConversation(conversationId) {
    currentConversation = conversationId;
    renderConversations(conversations);
    
    try {
        const response = await fetch(`/api/conversations/${conversationId}/messages/`);
        const messages = await response.json();
        renderChatView(conversationId, messages.results || messages);
        connectWebSocket(conversationId);
    } catch (error) {
        console.error('Error loading conversation:', error);
    }
}

function renderChatView(conversationId, messages) {
    const chatMain = document.getElementById('chatMain');
    const conversation = conversations.find(c => c.conversation_id === conversationId);
    
    chatMain.innerHTML = `
        <div class="chat-header-bar">
            <div class="conversation-avatar">
                ${conversation.conversation_type === 'group' ? '👥' : '👤'}
            </div>
            <div class="chat-header-info">
                <div class="chat-header-name">
                    ${conversation.name || getConversationName(conversation)}
                </div>
                <div class="chat-header-status">
                    ${conversation.participants.length} مشارك
                </div>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            ${messages.map(msg => renderMessage(msg)).join('')}
        </div>
        
        <div class="typing-indicator" id="typingIndicator"></div>
        
        <div class="chat-input-area">
            <textarea class="chat-input" id="messageInput" 
                      placeholder="اكتب رسالتك..." 
                      onkeypress="handleKeyPress(event)"
                      oninput="handleTyping()"></textarea>
            <button class="chat-send-btn" onclick="sendMessage()">
                ➤
            </button>
        </div>
    `;
    
    scrollToBottom();
}

function renderMessage(msg) {
    const isSent = msg.sender_id === {{ request.user.id }};
    return `
        <div class="message ${isSent ? 'sent' : 'received'}">
            <div class="message-avatar">
                ${isSent ? '👤' : '👤'}
            </div>
            <div class="message-content">
                <div class="message-bubble">
                    ${msg.content}
                </div>
                <div class="message-time">
                    ${formatTime(msg.created_at)}
                    ${msg.is_edited ? '✏️' : ''}
                </div>
            </div>
        </div>
    `;
}

function scrollToBottom() {
    const messagesContainer = document.getElementById('chatMessages');
    if (messagesContainer) {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
}

function connectWebSocket(conversationId) {
    if (websocket) {
        websocket.close();
    }
    
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws/chat/${conversationId}/`;
    
    websocket = new WebSocket(wsUrl);
    
    websocket.onopen = function() {
        console.log('WebSocket connected');
    };
    
    websocket.onmessage = function(event) {
        const data = JSON.parse(event.data);
        handleWebSocketMessage(data);
    };
    
    websocket.onerror = function(error) {
        console.error('WebSocket error:', error);
    };
    
    websocket.onclose = function() {
        console.log('WebSocket disconnected');
    };
}

function handleWebSocketMessage(data) {
    switch (data.type) {
        case 'chat_message':
            addMessageToChat(data.message);
            break;
        case 'typing_indicator':
            showTypingIndicator(data);
            break;
        case 'message_read':
            markMessageAsRead(data.message_id);
            break;
        case 'message_edited':
            updateMessageInChat(data.message);
            break;
        case 'message_deleted':
            removeMessageFromChat(data.message_id);
            break;
        case 'user_joined':
            showNotification(`${data.username} انضم للمحادثة`);
            break;
        case 'user_left':
            showNotification(`${data.username} غادر المحادثة`);
            break;
    }
}

function addMessageToChat(message) {
    const messagesContainer = document.getElementById('chatMessages');
    if (messagesContainer) {
        const messageHtml = renderMessage(message);
        messagesContainer.insertAdjacentHTML('beforeend', messageHtml);
        scrollToBottom();
    }
}

function updateMessageInChat(message) {
    // Find and update the message in the DOM
    // Implementation depends on message structure
}

function removeMessageFromChat(messageId) {
    // Find and remove the message from the DOM
    // Implementation depends on message structure
}

function showTypingIndicator(data) {
    const indicator = document.getElementById('typingIndicator');
    if (indicator) {
        if (data.is_typing) {
            indicator.textContent = `${data.username} يكتب...`;
        } else {
            indicator.textContent = '';
        }
    }
}

function markMessageAsRead(messageId) {
    // Update message read status in the DOM
}

function showNotification(message) {
    // Show a notification toast
    console.log('Notification:', message);
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    
    if (!content || !currentConversation) return;
    
    try {
        const response = await fetch('/api/messages/send_message/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken()
            },
            body: JSON.stringify({
                conversation_id: currentConversation,
                message_type: 'text',
                content: content
            })
        });
        
        if (response.ok) {
            input.value = '';
        }
    } catch (error) {
        console.error('Error sending message:', error);
    }
}

function handleKeyPress(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
    }
}

let typingTimeout;
function handleTyping() {
    if (websocket && websocket.readyState === WebSocket.OPEN) {
        websocket.send(JSON.stringify({
            type: 'typing',
            is_typing: true
        }));
        
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            websocket.send(JSON.stringify({
                type: 'typing',
                is_typing: false
            }));
        }, 1000);
    }
}

function searchConversations() {
    const query = document.getElementById('searchConversations').value.toLowerCase();
    const filtered = conversations.filter(conv => {
        const name = (conv.name || getConversationName(conv)).toLowerCase();
        return name.includes(query);
    });
    renderConversations(filtered);
}

function createNewConversation() {
    document.getElementById('createConversationModal').classList.add('active');
}

function closeModal() {
    document.getElementById('createConversationModal').classList.remove('active');
}

function toggleGroupName() {
    const type = document.getElementById('conversationType').value;
    const groupNameGroup = document.getElementById('groupNameGroup');
    groupNameGroup.style.display = type === 'group' ? 'block' : 'none';
}

async function loadUsers() {
    try {
        const response = await fetch('/api/users/');
        const users = await response.json();
        const select = document.getElementById('participantSelect');
        select.innerHTML = users.map(user => 
            `<option value="${user.id}">${user.username}</option>`
        ).join('');
    } catch (error) {
        console.error('Error loading users:', error);
    }
}

document.getElementById('createConversationForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const participantIds = Array.from(document.getElementById('participantSelect').selectedOptions)
        .map(option => parseInt(option.value));
    
    try {
        const response = await fetch('/api/conversations/create_conversation/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken()
            },
            body: JSON.stringify({
                conversation_type: formData.get('conversation_type'),
                name: formData.get('name'),
                participant_ids: participantIds
            })
        });
        
        if (response.ok) {
            closeModal();
            loadConversations();
        }
    } catch (error) {
        console.error('Error creating conversation:', error);
    }
});

function getCSRFToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]')?.value || 
           getCookie('csrftoken');
}

function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
}
</script>
{% endblock %}
