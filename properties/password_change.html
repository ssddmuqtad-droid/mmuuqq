{% extends 'properties/base.html' %}

{% block title %}تغيير كلمة المرور{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h1>تغيير كلمة المرور</h1>
      <p>قم بتغيير كلمة المرور الخاصة بك</p>
    </div>

    <form method="post" action="{% url 'password_change' %}" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="old_password">
          <span class="label-icon">🔒</span>
          كلمة المرور الحالية
        </label>
        <input type="password" name="old_password" id="old_password" class="form-control" required autocomplete="current-password" placeholder="أدخل كلمة المرور الحالية">
      </div>
      
      <div class="form-group">
        <label for="new_password">
          <span class="label-icon">🔑</span>
          كلمة المرور الجديدة
        </label>
        <input type="password" name="new_password" id="new_password" class="form-control" required autocomplete="new-password" placeholder="اختر كلمة مرور جديدة (8 أحرف على الأقل)">
      </div>
      
      <div class="form-group">
        <label for="confirm_password">
          <span class="label-icon">✅</span>
          تأكيد كلمة المرور الجديدة
        </label>
        <input type="password" name="confirm_password" id="confirm_password" class="form-control" required autocomplete="new-password" placeholder="أعد إدخال كلمة المرور الجديدة">
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg auth-submit">
        <span class="btn-icon">💾</span>
        حفظ التغييرات
      </button>
    </form>

    <div class="auth-footer">
      <a href="{% url 'dashboard' %}" class="back-link">
        <span class="back-icon">←</span>
        العودة للوحة التحكم
      </a>
    </div>
  </div>
</div>

<style>
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--bg);
}

.auth-card {
  background: var(--card-bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}

.auth-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--gradient-primary);
}

.auth-header {
  text-align: center;
  margin-bottom: 24px;
}

.auth-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.auth-header h1 {
  font-size: 2rem;
  font-weight: 900;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.auth-header p {
  color: var(--text-light);
  font-size: 0.95rem;
}

.auth-form {
  margin-bottom: 24px;
}

.auth-form .form-group {
  margin-bottom: 20px;
}

.auth-form label {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 0.95rem;
}

.label-icon {
  font-size: 1.1rem;
}

.auth-form .form-control {
  background: var(--bg-alt);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  color: var(--text);
  font-size: 1rem;
  transition: all 0.3s ease;
  width: 100%;
}

.auth-form .form-control:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
}

.auth-form .form-control::placeholder {
  color: var(--text-light);
}

.auth-submit {
  width: 100%;
  padding: 16px;
  font-size: 1.1rem;
  font-weight: 700;
  background: var(--gradient-primary);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
}

.auth-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
}

.auth-submit:active {
  transform: translateY(0);
}

.btn-icon {
  font-size: 1.2rem;
}

.auth-footer {
  text-align: center;
  margin-top: 24px;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-light);
  text-decoration: none;
  font-size: 0.9rem;
  transition: all 0.3s ease;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
}

.back-link:hover {
  color: var(--primary);
  background: rgba(255, 107, 53, 0.1);
}

.back-icon {
  transition: transform 0.3s ease;
}

.back-link:hover .back-icon {
  transform: translateX(-4px);
}

@media (max-width: 480px) {
  .auth-card {
    padding: 28px;
  }
  
  .auth-header h1 {
    font-size: 1.6rem;
  }
  
  .auth-icon {
    font-size: 2.5rem;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const newPassword = document.getElementById('new_password');
  const confirmPassword = document.getElementById('confirm_password');
  const form = document.querySelector('.auth-form');

  if (form) {
    form.addEventListener('submit', function(e) {
      if (newPassword.value !== confirmPassword.value) {
        e.preventDefault();
        alert('كلمات المرور غير متطابقة!');
        confirmPassword.focus();
      } else if (newPassword.value.length < 8) {
        e.preventDefault();
        alert('كلمة المرور يجب أن تكون 8 أحرف على الأقل!');
        newPassword.focus();
      }
    });
  }
});
</script>
{% endblock %}
