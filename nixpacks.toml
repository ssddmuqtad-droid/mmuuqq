[phases.setup]
nixPkgs = ["python312", "gcc", "pkg-config", "postgresql"]

[phases.build]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt",
    "echo 'Checking if settings.py exists:'",
    "ls -la dalal_project/settings.py",
    "echo 'Checking if properties app exists:'",
    "ls -la properties/",
    "echo 'Checking if settings.py contains properties:'",
    "grep -c 'properties' dalal_project/settings.py || echo '0'",
    "python manage.py makemigrations --noinput",
    "python manage.py migrate --noinput",
    "python manage.py collectstatic --noinput"
]

[phases.start]
cmd = "python run_server.py"

[variables]
DEBUG = "False"
PORT = "8080"
PYTHONUNBUFFERED = "1"
PYTHONPATH = "/app"
DJANGO_SETTINGS_MODULE = "dalal_project.settings"
ALLOW_SQLITE_FALLBACK = "False"
GUNICORN_WORKERS = "2"
GUNICORN_TIMEOUT = "120"
GUNICORN_LOG_LEVEL = "debug"
