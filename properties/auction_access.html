{% extends 'properties/base.html' %}

{% block title %}كود الدخول - {{ auction.title }}{% endblock %}

{% block content %}
<div class="container">
  <div class="access-container">
    <div class="access-card">
      <div class="access-header">
        <div class="lock-icon">🔒</div>
        <h1>مزاد محمي بكود</h1>
        <p>هذا المزاد يتطلب كود دخول للوصول إليه</p>
      </div>

      <form method="post" class="access-form">
        {% csrf_token %}
        <div class="form-group">
          <label for="access_code">أدخل كود الدخول</label>
          <input type="text" name="access_code" id="access_code" class="form-control" 
                 placeholder="أدخل الكود هنا" required autocomplete="off">
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block">
          الدخول للمزاد
        </button>
      </form>

      <div class="access-footer">
        <p>إذا ليس لديك كود الدخول، يرجى التواصل مع الإدارة</p>
      </div>
    </div>
  </div>
</div>

<style>
.access-container {
  min-height: 60vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.access-card {
  background: var(--bg);
  padding: 40px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  max-width: 450px;
  width: 100%;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.access-header {
  text-align: center;
  margin-bottom: 32px;
}

.lock-icon {
  font-size: 4rem;
  margin-bottom: 16px;
}

.access-header h1 {
  font-size: 1.8rem;
  color: var(--text);
  margin: 0 0 12px 0;
}

.access-header p {
  color: var(--text-light);
  font-size: 1rem;
}

.access-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.access-form .form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.access-form label {
  font-weight: 600;
  color: var(--text);
}

.access-form input {
  padding: 12px 16px;
  font-size: 1rem;
  border: 2px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-alt);
  color: var(--text);
  text-align: center;
  letter-spacing: 2px;
}

.access-form input:focus {
  outline: none;
  border-color: var(--primary);
}

.access-footer {
  text-align: center;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.access-footer p {
  color: var(--text-light);
  font-size: 0.9rem;
}
</style>
{% endblock %}
