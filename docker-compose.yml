version: '3.8'

services:
  # Django Backend
  backend:
    build:
      context: ./acakar
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key-change-in-production
      - DATABASE_URL=
      - ALLOWED_HOSTS=localhost,127.0.0.1
    volumes:
      - ./acakar:/app
      - ./acakar/logs:/app/logs
    command: python manage.py runserver 0.0.0.0:8080
    networks:
      - dalal-network

  # Next.js Frontend
  frontend:
    build:
      context: ./luxury-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    volumes:
      - ./luxury-frontend/src:/app/src
      - ./luxury-frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - dalal-network

networks:
  dalal-network:
    driver: bridge