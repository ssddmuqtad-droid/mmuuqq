{% extends 'properties/base.html' %}

{% block title %}إنشاء دعوة للمزاد{% endblock %}

{% block content %}
<div class="container">
  <div class="invite-wrapper" style="max-width: 600px; margin: 60px auto;">
    <div class="invite-header" style="text-align: center; margin-bottom: 30px;">
      <h1 style="font-size: 2rem; color: var(--text); margin: 0 0 10px 0;">📧 إنشاء دعوة للمزاد</h1>
      <p style="color: var(--text-light); margin: 0;">{{ auction.title }}</p>
    </div>

    <form method="post" class="invite-form" style="background: var(--card-bg); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border);">
      {% csrf_token %}
      
      <div class="form-section" style="margin-bottom: 20px;">
        <h4 style="color: var(--text); margin: 0 0 15px 0;">دعوة مستخدم مسجل</h4>
        <div class="form-group" style="margin-bottom: 15px;">
          <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 600;">اسم المستخدم أو ID</label>
          <input type="text" name="user_id" class="form-control" placeholder="أدخل اسم المستخدم أو ID" 
                 style="width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: var(--radius); background: white; color: var(--text); font-size: 1rem;">
        </div>
      </div>

      <div style="text-align: center; margin: 20px 0; color: var(--text-light);">أو</div>

      <div class="form-section" style="margin-bottom: 20px;">
        <h4 style="color: var(--text); margin: 0 0 15px 0;">دعوة عبر البريد الإلكتروني</h4>
        <div class="form-group" style="margin-bottom: 15px;">
          <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 600;">البريد الإلكتروني</label>
          <input type="email" name="email" class="form-control" placeholder="example@email.com" 
                 style="width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: var(--radius); background: white; color: var(--text); font-size: 1rem;">
        </div>
      </div>

      <div class="form-section" style="margin-bottom: 20px;">
        <h4 style="color: var(--text); margin: 0 0 15px 0;">دعوة عبر الهاتف</h4>
        <div class="form-group" style="margin-bottom: 15px;">
          <label style="display: block; margin-bottom: 8px; color: var(--text); font-weight: 600;">رقم الهاتف</label>
          <input type="text" name="phone" class="form-control" placeholder="07xxxxxxxxx" 
                 style="width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: var(--radius); background: white; color: var(--text); font-size: 1rem;">
        </div>
      </div>

      <div class="form-actions" style="display: flex; gap: 15px; justify-content: flex-end;">
        <button type="submit" class="btn btn-primary" style="background: var(--gradient-primary); color: white; border: none; padding: 12px 24px; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer;">إنشاء الدعوة</button>
        <a href="{% url 'auction_detail' auction.id %}" class="btn btn-outline" style="background: transparent; color: var(--text); border: 2px solid var(--border); padding: 12px 24px; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none;">إلغاء</a>
      </div>
    </form>
  </div>
</div>

<style>
.form-control:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
}

.btn-outline:hover {
  border-color: var(--primary);
  color: var(--primary);
}
</style>
{% endblock %}
